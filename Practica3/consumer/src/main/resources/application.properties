# notificaciones-consumer/src/main/resources/application.properties
quarkus.http.port=8081

kafka.bootstrap.servers=localhost:9092
quarkus.mongodb.uuid-representation=standard

# --- CANAL: HISTORIAL-IN ---
mp.messaging.incoming.historial-in.connector=smallrye-kafka
mp.messaging.incoming.historial-in.topic=eventos-educativos
mp.messaging.incoming.historial-in.group.id=historial-group
mp.messaging.incoming.historial-in.value.deserializer=com.curso.kafka.configuration.EventoEducativoDeserializer
mp.messaging.incoming.historial-in.auto.offset.reset=earliest

# --- CANAL: ALERTAS-IN ---
mp.messaging.incoming.alertas-in.connector=smallrye-kafka
mp.messaging.incoming.alertas-in.topic=eventos-educativos
mp.messaging.incoming.alertas-in.group.id=alertas-group
mp.messaging.incoming.alertas-in.value.deserializer=com.curso.kafka.configuration.EventoEducativoDeserializer
mp.messaging.incoming.alertas-in.auto.offset.reset=earliest

# --- CANAL: CERTIFICADOS-IN ---
mp.messaging.incoming.certificados-in.connector=smallrye-kafka
mp.messaging.incoming.certificados-in.topic=eventos-educativos
mp.messaging.incoming.certificados-in.group.id=certificados-group
mp.messaging.incoming.certificados-in.value.deserializer=com.curso.kafka.configuration.EventoEducativoDeserializer
mp.messaging.incoming.certificados-in.auto.offset.reset=earliest

# --- CANALES OUTGOING ---
mp.messaging.outgoing.alertas-docentes-out.connector=smallrye-kafka
mp.messaging.outgoing.alertas-docentes-out.topic=alertas-docentes
mp.messaging.outgoing.alertas-docentes-out.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer

mp.messaging.outgoing.eventos-fallidos-out.connector=smallrye-kafka
mp.messaging.outgoing.eventos-fallidos-out.topic=eventos-fallidos
mp.messaging.outgoing.eventos-fallidos-out.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer

# --- BASE DE DATOS MONGODB ---
quarkus.mongodb.connection-string=mongodb://localhost:27017
quarkus.mongodb.database=notificaciones

# --- DEV SERVICES ---
%dev.quarkus.kafka.devservices.enabled=false
%dev.quarkus.mongodb.devservices.enabled=false